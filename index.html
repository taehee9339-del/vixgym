<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>빅스짐 세션 카드</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
  :root {
    --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
    --accent:#c8f000; --accent2:#ff4444; --text:#f0f0f0; --text-dim:#666; --text-mid:#aaa; --radius:14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif;
    min-height:100vh; max-width:430px; margin:0 auto; padding-bottom:170px;
  }
  .header { padding:16px 16px 0; position:sticky; top:0; background:var(--bg); z-index:100; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .gym-name { font-family:'Black Han Sans',sans-serif; font-size:1.25rem; letter-spacing:2px; color:var(--accent); }
  .header-right { display:flex; gap:6px; align-items:center; }
  .tab-btn { padding:6px 11px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.72rem; letter-spacing:1px; cursor:pointer; }
  .tab-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .today-date { font-size:0.72rem; color:var(--text-dim); }

  .plan-toggle { display:flex; gap:8px; margin-bottom:12px; }
  .plan-btn { flex:1; padding:9px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.82rem; letter-spacing:1px; cursor:pointer; text-align:center; }
  .plan-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .plan-btn sub { display:block; font-family:'Noto Sans KR',sans-serif; font-size:0.62rem; font-weight:300; margin-top:2px; opacity:0.8; }

  .day-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
  .day-tabs::-webkit-scrollbar { display:none; }
  .day-tab { flex-shrink:0; padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.8rem; letter-spacing:1px; cursor:pointer; }
  .day-tab.active { background:var(--surface2); border-color:var(--accent); color:var(--accent); }

  .session-container { padding:16px; display:none; }
  .session-header { margin-bottom:16px; }
  .session-title { font-family:'Black Han Sans',sans-serif; font-size:1.4rem; letter-spacing:2px; margin-bottom:4px; }
  .session-meta { display:flex; gap:8px; flex-wrap:wrap; }
  .meta-tag { font-size:0.7rem; padding:3px 10px; border-radius:20px; background:var(--surface2); color:var(--text-mid); border:1px solid var(--border); }

  .week-indicator { font-size:0.72rem; color:var(--accent); margin-top:8px; }

  .exercise-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
  .exercise-card.done { border-color:rgba(200,240,0,0.4); background:rgba(200,240,0,0.04); }
  .exercise-header { display:flex; align-items:center; padding:13px 14px; gap:10px; cursor:pointer; }
  .ex-number { width:26px; height:26px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Black Han Sans',sans-serif; font-size:0.78rem; color:var(--text-dim); flex-shrink:0; }
  .exercise-card.done .ex-number { background:var(--accent); border-color:var(--accent); color:#000; }
  .ex-info { flex:1; min-width:0; }
  .ex-name-wrap { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .ex-name { font-weight:700; font-size:0.88rem; cursor:text; border:none; border-bottom:1px dashed transparent; outline:none; background:transparent; color:var(--text); font-family:'Noto Sans KR',sans-serif; width:100%; min-width:0; padding:0; }
  .ex-name:focus { border-bottom-color:var(--accent); }
  .edit-icon { font-size:0.68rem; color:var(--text-dim); flex-shrink:0; }
  .ex-detail { font-size:0.72rem; color:var(--text-dim); }
  .ex-rpe { font-size:0.7rem; padding:3px 9px; border-radius:20px; background:var(--surface2); color:var(--text-mid); flex-shrink:0; }
  .exercise-card.done .ex-rpe { color:var(--accent); }

  .set-tracker { padding:0 14px 14px; display:none; }
  .set-tracker.open { display:block; }
  .set-header-row { display:flex; align-items:center; gap:5px; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .set-header-label { font-size:0.64rem; color:var(--text-dim); text-align:center; }
  .set-header-label.set-col { width:34px; flex-shrink:0; text-align:left; }
  .set-header-label.input-col { width:62px; flex-shrink:0; }
  .set-header-label.check-col { width:30px; flex-shrink:0; }

  .set-row { display:flex; align-items:center; gap:5px; margin-bottom:7px; }
  .set-label { font-size:0.72rem; color:var(--text-dim); width:34px; flex-shrink:0; }
  .set-input { width:62px; flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 2px; color:var(--text); font-size:0.8rem; font-family:'Noto Sans KR',sans-serif; text-align:center; -webkit-appearance:none; }
  .set-input:focus { outline:none; border-color:var(--accent); }
  .set-input.hidden { visibility:hidden; }
  .set-check { width:30px; height:30px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:0.85rem; }
  .set-check.checked { background:var(--accent); border-color:var(--accent); color:#000; }

  .total-volume-row { display:flex; align-items:center; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .total-volume-label { font-size:0.74rem; color:var(--text-mid); }
  .total-volume-val { font-family:'Black Han Sans',sans-serif; font-size:1rem; color:var(--accent); }

  .section-label { font-family:'Black Han Sans',sans-serif; font-size:0.78rem; letter-spacing:2px; color:var(--text-dim); padding:8px 0; border-bottom:1px solid var(--border); margin-bottom:10px; margin-top:6px; }
  .warning-tag { font-size:0.66rem; color:var(--accent2); background:rgba(255,68,68,0.1); padding:2px 8px; border-radius:20px; border:1px solid rgba(255,68,68,0.2); display:inline-block; margin-top:4px; }
  .plan-b-badge { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.3); color:var(--accent2); border-radius:8px; padding:10px 14px; font-size:0.76rem; margin-bottom:14px; line-height:1.6; }
  .plan-b-badge b { color:#ff6666; }

  /* 하단 바 */
  .bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--surface); border-top:1px solid var(--border); padding:10px 14px 14px; z-index:200; }
  .progress-bar { width:100%; height:3px; background:var(--border); border-radius:2px; margin-bottom:10px; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .timer-row { display:flex; align-items:center; gap:10px; }
  .timer-left { flex-shrink:0; width:78px; }
  .timer-label { font-size:0.66rem; color:var(--text-dim); margin-bottom:2px; }
  .timer-time { font-family:'Black Han Sans',sans-serif; font-size:1.5rem; letter-spacing:1px; color:var(--accent); line-height:1.1; white-space:nowrap; }
  .timer-time.running { animation:pulse 1s infinite; }
  .timer-time.done-flash { animation:flash 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes flash { 0%,100%{color:var(--accent2)} 50%{color:var(--accent)} }
  .timer-right { flex:1; display:flex; flex-direction:column; gap:6px; }
  .timer-adjust { display:flex; align-items:center; gap:6px; }
  .timer-adjust-btn { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .timer-adjust-label { flex:1; text-align:center; font-size:0.7rem; color:var(--text-dim); }
  .timer-actions { display:flex; gap:6px; }
  .timer-btn { flex:1; padding:8px; border-radius:10px; border:none; font-family:'Black Han Sans',sans-serif; font-size:0.76rem; letter-spacing:1px; cursor:pointer; }
  .timer-btn.start { background:var(--accent); color:#000; }
  .timer-btn.reset { background:var(--surface2); color:var(--text-mid); border:1px solid var(--border); }

  /* 기록 */
  .record-container { padding:16px; display:none; }
  .record-title { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; letter-spacing:2px; margin-bottom:4px; }
  .record-sub { font-size:0.74rem; color:var(--text-dim); margin-bottom:16px; }
  .week-select { display:flex; gap:6px; margin-bottom:16px; }
  .week-select-btn { flex:1; padding:9px 4px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.76rem; cursor:pointer; text-align:center; }
  .week-select-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .record-section { margin-bottom:20px; }
  .record-section-title { font-family:'Black Han Sans',sans-serif; font-size:0.78rem; letter-spacing:2px; color:var(--text-dim); padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:10px; }
  .record-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .record-card-name { font-weight:700; font-size:0.86rem; margin-bottom:8px; }
  .record-week-row { display:flex; gap:5px; }
  .record-week-item { flex:1; text-align:center; }
  .record-week-label { font-size:0.62rem; color:var(--text-dim); margin-bottom:4px; }
  .record-week-val { font-family:'Black Han Sans',sans-serif; font-size:0.8rem; color:var(--accent); background:var(--surface2); border-radius:6px; padding:6px 2px; }
  .record-week-val.empty { color:var(--text-dim); font-family:'Noto Sans KR',sans-serif; font-size:0.72rem; }
  .record-week-val.down { color:var(--accent2); background:rgba(255,68,68,0.12); }
  .record-reset-btn { width:100%; padding:12px; border-radius:10px; border:1px solid var(--accent2); background:rgba(255,68,68,0.1); color:var(--accent2); font-family:'Black Han Sans',sans-serif; font-size:0.78rem; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="gym-name">VIXGYM</div>
    <div class="header-right">
      <div class="tab-btn active" id="tab-session" onclick="switchMainTab('session')">세션</div>
      <div class="tab-btn" id="tab-record" onclick="switchMainTab('record')">기록</div>
      <div class="today-date" id="today-date"></div>
    </div>
  </div>
  <div id="session-header-controls">
    <div class="plan-toggle">
      <div class="plan-btn active" onclick="setPlan('A')" id="btn-planA">PLAN A <sub>목: 등+하체후면 가능</sub></div>
      <div class="plan-btn" onclick="setPlan('B')" id="btn-planB">PLAN B <sub>목: 컨디션 안 좋을 때</sub></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
  </div>
</div>

<div id="sessions"></div>

<div class="record-container" id="record-view">
  <div class="record-title">볼륨 기록</div>
  <div class="record-sub">주차별 총 볼륨 (무게 × 횟수, 4세트 합) · 전 주보다 줄면 빨간색</div>
  <div class="week-select" id="week-select"></div>
  <div id="record-content"></div>
  <button class="record-reset-btn" onclick="resetAllRecords()">전체 기록 초기화</button>
</div>

<div class="bottom-bar">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="timer-row">
    <div class="timer-left">
      <div class="timer-label">휴식 타이머</div>
      <div class="timer-time" id="timer-display">2:00</div>
    </div>
    <div class="timer-right">
      <div class="timer-adjust">
        <button class="timer-adjust-btn" onclick="adjustTimer(-30)">−</button>
        <div class="timer-adjust-label">30초 조절</div>
        <button class="timer-adjust-btn" onclick="adjustTimer(30)">+</button>
      </div>
      <div class="timer-actions">
        <button class="timer-btn start" id="timer-start-btn" onclick="toggleTimer()">시작</button>
        <button class="timer-btn reset" onclick="resetTimer()">리셋</button>
      </div>
    </div>
  </div>
</div>

      { label:'등', exercises:[
        { name:'덤벨 루마니안 데드리프트', reps:'10~12', rpe:'7~8', warn:true },
        { name:'랫풀다운 (와이드)', reps:'8~10', rpe:'7~8' },
        { name:'시티드 케이블 로우 (넓게)', reps:'10', rpe:'7~8' },
      ]},
      { label:'하체 후면', exercises:[
        { name:'Cybex Prone 레그컬', reps:'12', rpe:'7~8' },
        { name:'Cybex Seated 레그컬', reps:'12', rpe:'7~8' },
      ]},
    ]},
  }}
};

// ===== 상태 =====
let currentPlan = 'A';
let currentDay = '월';
let currentWeek = 1;
let recordWeek = 1;
let checkedSets = {};
let timerInterval = null, timerSeconds = 120, timerTarget = 120, timerRunning = false;
let audioCtx = null, alarmInterval = null, wakeLock = null;

// localStorage 저장 구조: STORE[week][exId] = totalVolume
let STORE = {};
function loadStore() {
  try { STORE = JSON.parse(localStorage.getItem('vixgym_records') || '{}'); }
  catch(e) { STORE = {}; }
}
function saveStore() {
  try { localStorage.setItem('vixgym_records', JSON.stringify(STORE)); } catch(e){}
}
function loadName(exId, def) {
  try { return localStorage.getItem('vixgym_name_'+exId) || def; } catch(e){ return def; }
}
function saveName(exId, name) {
  try { localStorage.setItem('vixgym_name_'+exId, name); } catch(e){}
}
function loadWeek() {
  try { currentWeek = parseInt(localStorage.getItem('vixgym_week')||'1'); recordWeek = currentWeek; } catch(e){}
}
function saveWeek() {
  try { localStorage.setItem('vixgym_week', String(currentWeek)); } catch(e){}
}

// ===== 오디오 =====
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', initAudio, {passive:true});
document.addEventListener('click', initAudio, {passive:true});
document.addEventListener('visibilitychange', () => { if (!document.hidden) initAudio(); });

function playOneBeep() {
  try {
    initAudio();
    if (!audioCtx) return;
    // 날카롭고 크게 들리는 알람 (사각파 + 높은 주파수)
    const freqs = [1200, 1500];
    [0, 0.25].forEach((delay, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = freqs[i];
      osc.type = 'square';
      const t = audioCtx.currentTime + delay;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.8, t + 0.02);
      gain.gain.setValueAtTime(0.8, t + 0.18);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      osc.start(t); osc.stop(t + 0.22);
    });
  } catch(e){}
}

function vibrate() {
  if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 300]);
}

function startAlarm() {
  stopAlarm();
  playOneBeep(); vibrate();
  alarmInterval = setInterval(() => { playOneBeep(); vibrate(); }, 1200);
  const d = document.getElementById('timer-display');
  d.textContent = '완료!';
  d.classList.add('done-flash');
  const btn = document.getElementById('timer-start-btn');
  btn.textContent = '중지'; btn.style.background = 'var(--accent2)';
}

function stopAlarm() {
  if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
  if (navigator.vibrate) navigator.vibrate(0);
  document.getElementById('timer-display').classList.remove('done-flash');
  document.getElementById('timer-start-btn').style.background = 'var(--accent)';
}

// ===== Wake Lock =====
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e){}
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});

// ===== 날짜 =====
function setToday() {
  const days = ['일','월','화','수','목','금','토'];
  const now = new Date();
  const dn = days[now.getDay()];
  document.getElementById('today-date').textContent = `${now.getMonth()+1}/${now.getDate()}(${dn})`;
  if (PLAN_DATA[currentPlan].days.includes(dn)) currentDay = dn;
}

// ===== 메인 탭 =====
function switchMainTab(tab) {
  document.getElementById('tab-session').classList.toggle('active', tab==='session');
  document.getElementById('tab-record').classList.toggle('active', tab==='record');
  document.getElementById('session-header-controls').style.display = tab==='session'?'block':'none';
  document.querySelectorAll('.session-container').forEach(el => el.style.display='none');
  if (tab==='session') {
    const t = document.getElementById(`session-${currentPlan}-${currentDay}`);
    if (t) t.style.display='block';
    document.getElementById('record-view').style.display='none';
  } else {
    document.getElementById('record-view').style.display='block';
    renderRecordView();
  }
}

// ===== 플랜/요일 =====
function setPlan(plan) {
  currentPlan = plan;
  document.getElementById('btn-planA').classList.toggle('active', plan==='A');
  document.getElementById('btn-planB').classList.toggle('active', plan==='B');
  renderDayTabs();
  document.querySelectorAll('.session-container').forEach(el=>el.style.display='none');
  const t = document.getElementById(`session-${currentPlan}-${currentDay}`);
  if (t) t.style.display='block';
  updateProgress();
}
function renderDayTabs() {
  const c = document.getElementById('day-tabs'); c.innerHTML='';
  PLAN_DATA[currentPlan].days.forEach(day => {
    const tab = document.createElement('div');
    tab.className = 'day-tab'+(day===currentDay?' active':'');
    tab.textContent = day; tab.onclick = ()=>selectDay(day);
    c.appendChild(tab);
  });
}
function selectDay(day) {
  currentDay = day; renderDayTabs();
  document.querySelectorAll('.session-container').forEach(el=>el.style.display='none');
  const t = document.getElementById(`session-${currentPlan}-${day}`);
  if (t) t.style.display='block';
  updateProgress();
}

// ===== 세션 렌더 =====
function renderSessions() {
  const c = document.getElementById('sessions'); c.innerHTML='';
  Object.entries(PLAN_DATA).forEach(([pk, plan]) => {
    Object.entries(plan.sessions).forEach(([day, session]) => {
      const div = document.createElement('div');
      div.className = 'session-container';
      div.id = `session-${pk}-${day}`;
      div.style.display = (pk===currentPlan && day===currentDay)?'block':'none';
      let exIdx=0;
      let html = `<div class="session-header"><div class="session-title">${session.title}</div>
        <div class="session-meta">${session.tags.map(t=>`<span class="meta-tag">${t}</span>`).join('')}</div>
        <div class="week-indicator">📍 현재 <b>${currentWeek}주차</b> 기록 중 (기록 탭에서 변경)</div></div>`;
      if (session.planBNote) html += `<div class="plan-b-badge">⚡ <b>플랜 B</b> — ${session.planBNote}</div>`;
      session.sections.forEach(sec => {
        html += `<div class="section-label">${sec.label}</div>`;
        sec.exercises.forEach(ex => {
          const exId = `${pk}-${day}-${exIdx}`;
          html += renderExerciseCard(ex, exId, exIdx+1);
          exIdx++;
        });
      });
      div.innerHTML = html;
      c.appendChild(div);
    });
  });
}

function renderExerciseCard(ex, exId, num) {
  const noWeight = ex.noWeight;
  const name = loadName(exId, ex.name);
  let setsHTML = `<div class="set-header-row">
    <div class="set-header-label set-col">세트</div>
    ${noWeight?'':'<div class="set-header-label input-col">무게(kg)</div>'}
    <div class="set-header-label input-col">횟수</div>
    <div class="set-header-label check-col">완료</div>
  </div>`;
  for (let i=1;i<=DEFAULT_SETS;i++){
    const cid = `${exId}-set${i}`;
    setsHTML += `<div class="set-row">
      <div class="set-label">SET ${i}</div>
      ${noWeight?'':`<input class="set-input" type="number" inputmode="decimal" placeholder="kg" id="weight-${cid}" onchange="onSetChange('${exId}')">`}
      <input class="set-input" type="number" inputmode="numeric" placeholder="회" id="reps-${cid}" onchange="onSetChange('${exId}')">
      <div class="set-check" id="check-${cid}" onclick="toggleSet('${cid}','${exId}')">✓</div>
    </div>`;
  }
  const volLabel = noWeight ? '총 횟수' : '총 볼륨 (무게×횟수)';
  const volUnit = noWeight ? '회' : 'kg';
  setsHTML += `<div class="total-volume-row">
    <div class="total-volume-label">${volLabel}</div>
    <div class="total-volume-val" id="totalvol-${exId}">0${volUnit}</div>
  </div>`;

  return `<div class="exercise-card" id="card-${exId}">
    <div class="exercise-header" onclick="toggleTracker('${exId}')">
      <div class="ex-number" id="num-${exId}">${num}</div>
      <div class="ex-info">
        <div class="ex-name-wrap">
          <input class="ex-name" type="text" value="${name}" onclick="event.stopPropagation()" onchange="onNameChange('${exId}', this.value)">
          <span class="edit-icon">✎</span>
        </div>
        <div class="ex-detail">${DEFAULT_SETS}세트 × ${ex.reps}회${ex.warn?'<br><span class="warning-tag">⚠️ 허리 폼 주의</span>':''}</div>
      </div>
      <div class="ex-rpe">RPE ${ex.rpe}</div>
    </div>
    <div class="set-tracker" id="tracker-${exId}">${setsHTML}</div>
  </div>`;
}

function getExMeta(exId) {
  const [pk, day, idxStr] = exId.split('-');
  const idx = parseInt(idxStr);
  let cnt=0;
  for (const sec of PLAN_DATA[pk].sessions[day].sections) {
    for (const ex of sec.exercises) {
      if (cnt===idx) return ex;
      cnt++;
    }
  }
  return null;
}

function onNameChange(exId, name) { saveName(exId, name); }
function toggleTracker(exId) { document.getElementById(`tracker-${exId}`).classList.toggle('open'); }

function onSetChange(exId) {
  updateTotalVolume(exId);
}

function calcTotalVolume(exId) {
  const ex = getExMeta(exId);
  const noWeight = ex && ex.noWeight;
  let total = 0;
  for (let i=1;i<=DEFAULT_SETS;i++){
    const cid = `${exId}-set${i}`;
    const reps = parseInt(document.getElementById(`reps-${cid}`)?.value)||0;
    if (noWeight) {
      total += reps;
    } else {
      const w = parseFloat(document.getElementById(`weight-${cid}`)?.value)||0;
      total += w*reps;
    }
  }
  return { total, noWeight };
}

function updateTotalVolume(exId) {
  const { total, noWeight } = calcTotalVolume(exId);
  const unit = noWeight ? '회' : 'kg';
  const el = document.getElementById(`totalvol-${exId}`);
  if (el) el.textContent = total.toLocaleString()+unit;
  // 기록 저장
  if (!STORE[currentWeek]) STORE[currentWeek] = {};
  STORE[currentWeek][exId] = total;
  saveStore();
}

function toggleSet(cid, exId) {
  initAudio();
  const check = document.getElementById(`check-${cid}`);
  const isChecked = check.classList.toggle('checked');
  checkedSets[cid] = isChecked;

  const ex = getExMeta(exId);
  let cc=0;
  for (let i=1;i<=DEFAULT_SETS;i++) if (checkedSets[`${exId}-set${i}`]) cc++;
  document.getElementById(`card-${exId}`).classList.toggle('done', cc===DEFAULT_SETS);

  updateTotalVolume(exId);
  updateProgress();

  if (isChecked) { resetTimer(); startTimer(); }
}

function updateProgress() {
  const session = PLAN_DATA[currentPlan].sessions[currentDay];
  if (!session) return;
  let total=0, done=0, exIdx=0;
  session.sections.forEach(sec => {
    sec.exercises.forEach(ex => {
      const exId = `${currentPlan}-${currentDay}-${exIdx}`;
      for (let i=1;i<=DEFAULT_SETS;i++){ total++; if (checkedSets[`${exId}-set${i}`]) done++; }
      exIdx++;
    });
  });
  document.getElementById('progress-fill').style.width = (total>0?done/total*100:0)+'%';
}

// ===== 타이머 =====
function adjustTimer(d) {
  const nv = timerTarget + d;
  if (nv < 30) return;
  timerTarget = nv;
  if (!timerRunning) { timerSeconds = timerTarget; updateTimerDisplay(); }
}
function toggleTimer() {
  if (alarmInterval) { stopAlarm(); timerSeconds = timerTarget; updateTimerDisplay(); return; }
  timerRunning ? pauseTimer() : startTimer();
}
function startTimer() {
  if (timerRunning) return;
  if (timerSeconds <= 0) timerSeconds = timerTarget;
  timerRunning = true;
  requestWakeLock();
  document.getElementById('timer-start-btn').textContent = '정지';
  document.getElementById('timer-display').classList.add('running');
  timerInterval = setInterval(() => {
    if (timerSeconds > 0) { timerSeconds--; updateTimerDisplay(); }
    else {
      pauseTimer();
      startAlarm();
      // 자동 리셋: 알람 울리면서 시간은 원래대로 준비
      timerSeconds = timerTarget;
    }
  }, 1000);
}
function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-start-btn').textContent = '시작';
  document.getElementById('timer-display').classList.remove('running');
}
function resetTimer() {
  stopAlarm(); pauseTimer();
  timerSeconds = timerTarget; updateTimerDisplay();
}
function updateTimerDisplay() {
  if (alarmInterval) return;
  const m = Math.floor(timerSeconds/60), s = timerSeconds%60;
  document.getElementById('timer-display').textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

// ===== 기록 =====
function renderWeekSelect() {
  const c = document.getElementById('week-select'); c.innerHTML='';
  for (let w=1; w<=4; w++){
    const btn = document.createElement('div');
    btn.className = 'week-select-btn'+(w===recordWeek?' active':'');
    btn.textContent = w+'주차';
    btn.onclick = ()=>{ recordWeek=w; currentWeek=w; saveWeek(); renderWeekSelect(); renderRecordView(); renderSessions(); reapplyChecks(); };
    c.appendChild(btn);
  }
}

function renderRecordView() {
  renderWeekSelect();
  const container = document.getElementById('record-content');
  let html = '';
  const plan = PLAN_DATA[currentPlan];
  Object.entries(plan.sessions).forEach(([day, session]) => {
    let exIdx=0, secHtml='';
    session.sections.forEach(sec => {
      let exHtml='';
      sec.exercises.forEach(ex => {
        const exId = `${currentPlan}-${day}-${exIdx}`;
        const noWeight = ex.noWeight;
        const unit = noWeight?'회':'kg';
        const name = loadName(exId, ex.name);
        let weekCells='';
        for (let w=1; w<=4; w++){
          const val = (STORE[w] && STORE[w][exId]) ? STORE[w][exId] : 0;
          const prev = (w>1 && STORE[w-1] && STORE[w-1][exId]) ? STORE[w-1][exId] : 0;
          const isDown = (val>0 && prev>0 && val<prev);
          const disp = val>0 ? val.toLocaleString()+unit : '-';
          weekCells += `<div class="record-week-item">
            <div class="record-week-label">${w}주차</div>
            <div class="record-week-val ${val>0?'':'empty'} ${isDown?'down':''}">${disp}</div>
          </div>`;
        }
        exHtml += `<div class="record-card"><div class="record-card-name">${name}</div><div class="record-week-row">${weekCells}</div></div>`;
        exIdx++;
      });
      if (exHtml) secHtml += `<div class="record-section"><div class="record-section-title">${day}요일 — ${sec.label}</div>${exHtml}</div>`;
    });
    html += secHtml;
  });
  container.innerHTML = html;
}

function resetAllRecords() {
  if (confirm('모든 주차 기록을 초기화할까요? (운동 이름은 유지됩니다)')) {
    STORE = {}; saveStore();
    checkedSets = {};
    renderRecordView();
    renderSessions(); reapplyChecks(); updateProgress();
  }
}

function reapplyChecks() {
  // 화면 다시 그린 후 체크 상태/총볼륨 복원
  setTimeout(() => {
    Object.keys(checkedSets).forEach(cid => {
      if (checkedSets[cid]) {
        const el = document.getElementById(`check-${cid}`);
        if (el) el.classList.add('checked');
      }
    });
  }, 0);
}

// ===== 초기화 =====
loadStore(); loadWeek();
setToday();
renderDayTabs();
renderSessions();
updateProgress();
updateTimerDisplay();
</script>
</body>
</html>
