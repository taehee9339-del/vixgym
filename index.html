<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>이천 내추럴 1등 목표</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
  :root {
    --bg:#0d0d0d; --surface:#161616; --surface2:#1e1e1e; --border:#2a2a2a;
    --accent:#c8f000; --accent2:#ff4444; --text:#f0f0f0; --text-dim:#666; --text-mid:#aaa; --radius:14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; max-width:430px; margin:0 auto; padding-bottom:170px; }
  .header { padding:16px 16px 0; position:sticky; top:0; background:var(--bg); z-index:100; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .gym-name { font-family:'Black Han Sans',sans-serif; font-size:0.95rem; letter-spacing:1px; color:var(--accent); line-height:1.2; max-width:180px; }
  .header-right { display:flex; gap:6px; align-items:center; }
  .tab-btn { padding:6px 11px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.72rem; letter-spacing:1px; cursor:pointer; }
  .tab-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .today-date { font-size:0.72rem; color:var(--text-dim); }
  .plan-toggle { display:flex; gap:8px; margin-bottom:12px; }
  .plan-btn { flex:1; padding:9px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.82rem; letter-spacing:1px; cursor:pointer; text-align:center; }
  .plan-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .plan-btn sub { display:block; font-family:'Noto Sans KR',sans-serif; font-size:0.62rem; font-weight:300; margin-top:2px; opacity:0.8; }
  .day-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; }
  .day-tabs::-webkit-scrollbar { display:none; }
  .bw-track-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
  .bw-track-label { font-size:0.74rem; color:var(--text-mid); flex:1; }
  .bw-track-input { width:70px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:7px 6px; color:var(--text); font-size:0.82rem; font-family:'Noto Sans KR',sans-serif; text-align:center; -webkit-appearance:none; }
  .bw-track-input:focus { outline:none; border-color:var(--accent); }
  .bw-track-unit { font-size:0.7rem; color:var(--text-dim); }
  .day-tab { flex-shrink:0; padding:7px 16px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.8rem; letter-spacing:1px; cursor:pointer; }
  .day-tab.active { background:var(--surface2); border-color:var(--accent); color:var(--accent); }
  .session-container { padding:16px; display:none; }
  .session-header { margin-bottom:16px; }
  .session-title-wrap { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .session-title-input { font-family:'Black Han Sans',sans-serif; font-size:1.3rem; letter-spacing:1px; background:transparent; border:none; border-bottom:1px dashed #444; color:var(--text); outline:none; padding:2px 0; flex:1; min-width:0; }
  .session-title-input:focus { border-bottom-color:var(--accent); }
  .title-edit-icon { font-size:0.8rem; color:var(--text-dim); flex-shrink:0; }
  .week-indicator { font-size:0.72rem; color:var(--accent); margin-top:8px; }
  .exercise-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; }
  .exercise-card.done { border-color:rgba(200,240,0,0.5); background:rgba(200,240,0,0.04); }
  .exercise-header { display:flex; align-items:center; padding:13px 14px; gap:10px; cursor:pointer; }
  .ex-number { width:26px; height:26px; border-radius:50%; background:var(--surface2); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Black Han Sans',sans-serif; font-size:0.78rem; color:var(--text-dim); flex-shrink:0; }
  .exercise-card.done .ex-number { background:var(--accent); border-color:var(--accent); color:#000; }
  .ex-info { flex:1; min-width:0; }
  .ex-name-wrap { display:flex; align-items:center; gap:5px; margin-bottom:3px; }
  .ex-name { font-weight:700; font-size:0.88rem; border:none; border-bottom:1px dashed #444; outline:none; background:transparent; color:var(--text); font-family:'Noto Sans KR',sans-serif; width:100%; min-width:0; padding:2px 0; }
  .ex-name:focus { border-bottom-color:var(--accent); }
  .ex-name::placeholder { color:#555; }
  .edit-icon { font-size:0.68rem; color:var(--text-dim); flex-shrink:0; }
  .bw-toggle { font-size:0.6rem; padding:2px 7px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text-dim); cursor:pointer; flex-shrink:0; font-family:'Black Han Sans',sans-serif; letter-spacing:0.5px; white-space:nowrap; }
  .bw-toggle.on { background:rgba(200,240,0,0.15); border-color:var(--accent); color:var(--accent); }
  .ex-detail-edit { display:flex; gap:8px; align-items:center; }
  .ex-mini-input { width:80px; background:transparent; border:none; border-bottom:1px dashed #444; color:var(--text-dim); font-size:0.72rem; font-family:'Noto Sans KR',sans-serif; padding:1px 0; outline:none; }
  .ex-mini-input:focus { border-bottom-color:var(--accent); color:var(--text); }
  .ex-mini-input::placeholder { color:#555; }
  .set-tracker { padding:0 14px 14px; display:none; }
  .set-tracker.open { display:block; }
  .set-header-row { display:flex; align-items:center; gap:5px; margin-bottom:6px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .set-header-label { font-size:0.64rem; color:var(--text-dim); text-align:center; }
  .set-header-label.set-col { width:34px; flex-shrink:0; text-align:left; }
  .set-header-label.input-col { width:62px; flex-shrink:0; }
  .set-header-label.check-col { width:30px; flex-shrink:0; }
  .set-row { display:flex; align-items:center; gap:5px; margin-bottom:7px; }
  .set-label { font-size:0.72rem; color:var(--text-dim); width:34px; flex-shrink:0; }
  .set-input { width:62px; flex-shrink:0; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 2px; color:var(--text); font-size:0.8rem; font-family:'Noto Sans KR',sans-serif; text-align:center; -webkit-appearance:none; }
  .set-input:focus { outline:none; border-color:var(--accent); }
  .set-check { width:30px; height:30px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:0.85rem; }
  .set-check.checked { background:var(--accent); border-color:var(--accent); color:#000; }
  .total-row { display:flex; align-items:center; justify-content:space-between; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .total-row.first { margin-top:10px; }
  .total-label { font-size:0.74rem; color:var(--text-mid); }
  .total-val { font-family:'Black Han Sans',sans-serif; font-size:1rem; color:var(--accent); }
  .memo-row { margin-top:8px; }
  .memo-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:var(--text); font-size:0.76rem; font-family:'Noto Sans KR',sans-serif; resize:vertical; min-height:34px; }
  .memo-input:focus { outline:none; border-color:var(--accent); }
  .memo-input::placeholder { color:var(--text-dim); }
  .bottom-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--surface); border-top:1px solid var(--border); padding:10px 14px 14px; z-index:200; }
  .progress-bar { width:100%; height:3px; background:var(--border); border-radius:2px; margin-bottom:10px; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .timer-row { display:flex; align-items:center; gap:10px; }
  .timer-left { flex-shrink:0; width:78px; }
  .timer-label { font-size:0.66rem; color:var(--text-dim); margin-bottom:2px; }
  .timer-time { font-family:'Black Han Sans',sans-serif; font-size:1.5rem; letter-spacing:1px; color:var(--accent); line-height:1.1; white-space:nowrap; }
  .timer-time.running { animation:pulse 1s infinite; }
  .timer-time.done-flash { animation:flash 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes flash { 0%,100%{color:var(--accent2)} 50%{color:var(--accent)} }
  .timer-right { flex:1; display:flex; flex-direction:column; gap:6px; }
  .timer-adjust { display:flex; align-items:center; gap:6px; }
  .timer-adjust-btn { width:32px; height:32px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface2); color:var(--text); font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .timer-adjust-label { flex:1; text-align:center; font-size:0.7rem; color:var(--text-dim); }
  .timer-actions { display:flex; gap:6px; }
  .timer-btn { flex:1; padding:8px; border-radius:10px; border:none; font-family:'Black Han Sans',sans-serif; font-size:0.76rem; letter-spacing:1px; cursor:pointer; }
  .timer-btn.start { background:var(--accent); color:#000; }
  .timer-btn.reset { background:var(--surface2); color:var(--text-mid); border:1px solid var(--border); }
  .record-container { padding:16px; display:none; }
  .record-title { font-family:'Black Han Sans',sans-serif; font-size:1.2rem; letter-spacing:2px; margin-bottom:4px; }
  .record-sub { font-size:0.74rem; color:var(--text-dim); margin-bottom:16px; }
  .week-select { display:flex; gap:6px; margin-bottom:16px; }
  .week-select-btn { flex:1; padding:9px 4px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); font-family:'Black Han Sans',sans-serif; font-size:0.76rem; cursor:pointer; text-align:center; }
  .week-select-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
  .record-section { margin-bottom:20px; }
  .record-section-title { font-family:'Black Han Sans',sans-serif; font-size:0.78rem; letter-spacing:2px; color:var(--text-dim); padding:6px 0; border-bottom:1px solid var(--border); margin-bottom:10px; }
  .record-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
  .record-week-row { display:flex; gap:5px; }
  .record-week-item { flex:1; text-align:center; }
  .record-week-label { font-size:0.62rem; color:var(--text-dim); margin-bottom:4px; line-height:1.4; }
  .record-week-val { font-family:'Black Han Sans',sans-serif; font-size:0.78rem; color:var(--accent); background:var(--surface2); border-radius:6px; padding:6px 2px; }
  .record-week-val.empty { color:var(--text-dim); font-family:'Noto Sans KR',sans-serif; font-size:0.72rem; }
  .record-week-val.down { color:var(--accent2); background:rgba(255,68,68,0.12); }
  .record-reset-btn { width:100%; padding:12px; border-radius:10px; border:1px solid var(--accent2); background:rgba(255,68,68,0.1); color:var(--accent2); font-family:'Black Han Sans',sans-serif; font-size:0.78rem; cursor:pointer; margin-top:10px; }
  .cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .cal-nav-btn { width:34px; height:34px; border-radius:8px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:1rem; cursor:pointer; }
  .cal-label { font-family:'Black Han Sans',sans-serif; font-size:0.92rem; letter-spacing:1px; }
  .cal-dow-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
  .cal-dow-row div { text-align:center; font-size:0.62rem; color:var(--text-dim); padding-bottom:4px; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:14px; }
  .cal-cell { aspect-ratio:1; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; background:var(--surface); border:1.5px solid transparent; }
  .cal-cell.empty { visibility:hidden; cursor:default; }
  .cal-daynum { font-size:0.72rem; color:var(--text-mid); }
  .cal-cell.has-record .cal-daynum { color:var(--text); font-weight:700; }
  .cal-dot { width:4px; height:4px; border-radius:50%; background:var(--accent); margin-top:2px; }
  .cal-cell.today { border-color:var(--text-dim); }
  .cal-cell.selected { border-color:var(--accent); background:rgba(200,240,0,0.08); }
  .cal-detail { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:14px; min-height:60px; }
  .cal-detail-date { font-family:'Black Han Sans',sans-serif; font-size:0.9rem; color:var(--accent); margin-bottom:10px; }
  .cal-detail-section { margin-bottom:12px; }
  .cal-detail-section:last-child { margin-bottom:0; }
  .cal-detail-title { font-size:0.7rem; color:var(--text-dim); letter-spacing:1px; border-bottom:1px solid var(--border); padding-bottom:5px; margin-bottom:8px; }
  .cal-ex-row { display:flex; align-items:baseline; justify-content:space-between; gap:8px; padding:4px 0; flex-wrap:wrap; }
  .cal-ex-name { font-size:0.8rem; flex:1; min-width:0; }
  .cal-ex-val { font-family:'Black Han Sans',sans-serif; font-size:0.84rem; color:var(--accent); flex-shrink:0; }
  .cal-bw-row { font-size:0.78rem; color:var(--text-mid); margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .cal-bw-row b { color:var(--accent); font-family:'Black Han Sans',sans-serif; }
  .cal-ex-memo { width:100%; font-size:0.7rem; color:var(--text-dim); margin-top:2px; }
  .cal-empty-msg { color:var(--text-dim); font-size:0.78rem; text-align:center; padding:10px 0; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div class="gym-name">이천 내추럴 1등 목표</div>
    <div class="header-right">
      <div class="tab-btn active" id="tab-session" onclick="switchMainTab('session')">세션</div>
      <div class="tab-btn" id="tab-record" onclick="switchMainTab('record')">기록</div>
      <div class="today-date" id="today-date"></div>
    </div>
  </div>
  <div id="session-header-controls">
    <div class="bw-track-row">
      <span class="bw-track-label">⚖️ 오늘 공복 체중</span>
      <input class="bw-track-input" type="number" inputmode="decimal" step="0.1" placeholder="kg" id="bodyweight-input" onchange="saveBodyweightV(this.value)">
      <span class="bw-track-unit">kg</span>
    </div>
    <div class="plan-toggle">
      <div class="plan-btn active" onclick="setPlan('A')" id="btn-planA">PLAN A <sub>기본 루틴</sub></div>
      <div class="plan-btn" onclick="setPlan('B')" id="btn-planB">PLAN B <sub>컨디션 안 좋을 때</sub></div>
      <div class="plan-btn" onclick="setPlan('C')" id="btn-planC">PLAN C <sub>추가 루틴</sub></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
  </div>
</div>

<div id="sessions"></div>

<div class="record-container" id="record-view">
  <div class="record-title">기록 캘린더</div>
  <div class="record-sub">날짜를 누르면 그날 한 부위·종목·총 무게/횟수가 나와요</div>
  <div class="cal-header">
    <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
    <div class="cal-label" id="cal-label"></div>
    <button class="cal-nav-btn" onclick="calNav(1)">›</button>
  </div>
  <div class="cal-dow-row"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-detail" id="cal-detail"></div>
  <button class="record-reset-btn" onclick="resetAllRecords()">전체 기록 초기화</button>
</div>

<div class="bottom-bar">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="timer-row">
    <div class="timer-left">
      <div class="timer-label">휴식 타이머</div>
      <div class="timer-time" id="timer-display">2:00</div>
    </div>
    <div class="timer-right">
      <div class="timer-adjust">
        <button class="timer-adjust-btn" onclick="adjustTimer(-30)">−</button>
        <div class="timer-adjust-label">30초 조절</div>
        <button class="timer-adjust-btn" onclick="adjustTimer(30)">+</button>
      </div>
      <div class="timer-actions">
        <button class="timer-btn start" id="timer-start-btn" onclick="toggleTimer()">시작</button>
        <button class="timer-btn reset" onclick="resetTimer()">리셋</button>
      </div>
    </div>
  </div>
</div>

<script>
const DEFAULT_SETS = 4;
const SLOTS = 8;
const DAY_TITLES = { '월':'가슴','화':'등','수':'하체','목':'어깨','금':'팔 + 복근' };
const DAYS = ['월','화','수','목','금'];
const PLANS = ['A','B','C'];

let currentPlan='A', currentDay='월', currentDate='';
let checkedSets={};
let timerInterval=null, timerSeconds=120, timerTarget=120, timerRunning=false;
let audioCtx=null, alarmInterval=null, wakeLock=null;

// ===== 날짜 유틸 (주차 대신 실제 날짜를 기준으로 기록) =====
function todayStr(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
function fmtDateShort(d){ const p=d.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}`; }

// ===== 스토리지: 데이터는 항상 플랜A 기준 (A/B 공유) =====
// DOM ID: pk+day+slot (플랜별 고유) — 중복 방지
// 데이터 key: day+slot (플랜 무관)
function dataKey(day,slot){ return `vixgym_A_${day}_${slot}`; }
function domId(pk,day,slot){ return `${pk}-${day}-${slot}`; }

function lsGet(k,d){ try{ const v=localStorage.getItem(k); return v===null?d:v; }catch(e){ return d; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

// ===== 요일별로 실제 기록이 있었던 날짜 목록 (날짜 기반 기록의 핵심 인덱스) =====
let DAY_DATES={};
function loadDayDates(){ try{ DAY_DATES=JSON.parse(lsGet('vixgym_day_dates','{}')); }catch(e){ DAY_DATES={}; } }
function saveDayDates(){ lsSet('vixgym_day_dates',JSON.stringify(DAY_DATES)); }
function registerDayDate(day,d){
  if(!DAY_DATES[day]) DAY_DATES[day]=[];
  if(!DAY_DATES[day].includes(d)){ DAY_DATES[day].push(d); DAY_DATES[day].sort(); saveDayDates(); }
}
function getDayDates(day){ return DAY_DATES[day]||[]; }

// targetDate 이전(포함)에 기록된 값 중 가장 최근 값을 찾는다.
// 운동이름/세트구성/RPE/메모가 그날 안 바뀌었어도 직전 입력값을 그대로 보여주기 위한 상속 로직 (주차 → 날짜로 전환)
function valueAtOrBefore(prefix,day,slot,suffix,targetDate){
  const dates=getDayDates(day).filter(d=>d<=targetDate);
  for(let i=dates.length-1;i>=0;i--){
    const v=localStorage.getItem(`${prefix}_${dates[i]}_${dataKey(day,slot)}${suffix}`);
    if(v!==null&&v!=='') return v;
  }
  return '';
}
function inheritGet(prefix,day,slot,suffix){ return valueAtOrBefore(prefix,day,slot,suffix,currentDate); }

function loadName(day,slot){ return inheritGet('vxname',day,slot,''); }
function saveNameV(day,slot,v){ lsSet('vxname_'+currentDate+'_'+dataKey(day,slot),v); registerDayDate(day,currentDate); renderRecordIfOpen(); }
function loadReps(day,slot){ return inheritGet('vxreps',day,slot,''); }
function saveRepsV(day,slot,v){ lsSet('vxreps_'+currentDate+'_'+dataKey(day,slot),v); registerDayDate(day,currentDate); }
function loadRpe(day,slot){ return inheritGet('vxrpe',day,slot,''); }
function saveRpeV(day,slot,v){ lsSet('vxrpe_'+currentDate+'_'+dataKey(day,slot),v); registerDayDate(day,currentDate); }
function loadSetVal(day,slot,type,i){ return inheritGet('vxset_'+type,day,slot,'_'+i); }
function saveSetValV(day,slot,type,i,v){ lsSet(`vxset_${type}_${currentDate}_${dataKey(day,slot)}_${i}`,v); registerDayDate(day,currentDate); }
function loadMemo(day,slot){ return inheritGet('vxmemo',day,slot,''); }
function saveMemoV(day,slot,v){ lsSet(`vxmemo_${currentDate}_${dataKey(day,slot)}`,v); registerDayDate(day,currentDate); }
function loadBW(day,slot){ return lsGet('vxbw_'+dataKey(day,slot),'0')==='1'; }
function saveBW(day,slot,v){ lsSet('vxbw_'+dataKey(day,slot),v?'1':'0'); }

// ===== 매일 아침 공복 체중 (요일 탭과 무관, 날짜에만 종속, 자동 이어받기 없음) =====
function loadBodyweightExact(date){ return lsGet('vxbodyweight_'+date,''); }
function saveBodyweightV(v){ lsSet('vxbodyweight_'+currentDate,v); renderRecordIfOpen(); }
function renderBodyweightInput(){ const el=document.getElementById('bodyweight-input'); if(el) el.value=loadBodyweightExact(currentDate); }

let STORE={};
function loadStore(){ try{ STORE=JSON.parse(lsGet('vixgym_records','{}')); }catch(e){ STORE={}; } }
function saveStore(){ lsSet('vixgym_records',JSON.stringify(STORE)); }

// ===== 오디오 =====
function initAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }
document.addEventListener('touchstart',initAudio,{passive:true});
document.addEventListener('click',initAudio,{passive:true});
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) initAudio(); });
function playOneBeep(){ try{ initAudio(); if(!audioCtx)return; const fs=[1200,1500]; [0,0.25].forEach((d,i)=>{ const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=fs[i]; o.type='square'; const t=audioCtx.currentTime+d; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.8,t+0.02); g.gain.setValueAtTime(0.8,t+0.18); g.gain.exponentialRampToValueAtTime(0.0001,t+0.22); o.start(t); o.stop(t+0.22); }); }catch(e){} }
function vibrate(){ if(navigator.vibrate) navigator.vibrate([300,150,300,150,300]); }
function startAlarm(){ stopAlarm(); playOneBeep(); vibrate(); alarmInterval=setInterval(()=>{playOneBeep();vibrate();},1200); const d=document.getElementById('timer-display'); d.textContent='완료!'; d.classList.add('done-flash'); const b=document.getElementById('timer-start-btn'); b.textContent='중지'; b.style.background='var(--accent2)'; }
function stopAlarm(){ if(alarmInterval){clearInterval(alarmInterval);alarmInterval=null;} if(navigator.vibrate)navigator.vibrate(0); document.getElementById('timer-display').classList.remove('done-flash'); document.getElementById('timer-start-btn').style.background='var(--accent)'; }
async function requestWakeLock(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
document.addEventListener('visibilitychange',async()=>{ if(wakeLock!==null&&document.visibilityState==='visible') await requestWakeLock(); });

function loadDayTitle(day){ return lsGet('vxdaytitle_A_'+day, DAY_TITLES[day]||''); }
function saveDayTitle(day,v){ lsSet('vxdaytitle_A_'+day, v||DAY_TITLES[day]||''); renderRecordIfOpen(); }
function setToday(){ const d=['일','월','화','수','목','금','토']; const n=new Date(); const dn=d[n.getDay()]; document.getElementById('today-date').textContent=`${n.getMonth()+1}/${n.getDate()}(${dn})`; if(DAYS.includes(dn)) currentDay=dn; }

function switchMainTab(tab){
  document.getElementById('tab-session').classList.toggle('active',tab==='session');
  document.getElementById('tab-record').classList.toggle('active',tab==='record');
  document.getElementById('session-header-controls').style.display=tab==='session'?'block':'none';
  document.querySelectorAll('.session-container').forEach(el=>el.style.display='none');
  if(tab==='session'){ const t=document.getElementById(`session-${currentPlan}-${currentDay}`); if(t)t.style.display='block'; document.getElementById('record-view').style.display='none'; }
  else{ document.getElementById('record-view').style.display='block'; renderCalendar(); }
}
function setPlan(plan){
  currentPlan=plan;
  document.getElementById('btn-planA').classList.toggle('active',plan==='A');
  document.getElementById('btn-planB').classList.toggle('active',plan==='B');
  document.getElementById('btn-planC').classList.toggle('active',plan==='C');
  renderDayTabs();
  document.querySelectorAll('.session-container').forEach(el=>el.style.display='none');
  const t=document.getElementById(`session-${currentPlan}-${currentDay}`); if(t)t.style.display='block';
  recalcAll(); updateProgress();
}
function renderDayTabs(){
  const c=document.getElementById('day-tabs'); c.innerHTML='';
  DAYS.forEach(day=>{ const t=document.createElement('div'); t.className='day-tab'+(day===currentDay?' active':''); t.textContent=day; t.onclick=()=>selectDay(day); c.appendChild(t); });
}
function selectDay(day){
  currentDay=day; renderDayTabs();
  document.querySelectorAll('.session-container').forEach(el=>el.style.display='none');
  const t=document.getElementById(`session-${currentPlan}-${day}`); if(t)t.style.display='block';
  recalcAll(); updateProgress();
}

function renderSessions(){
  const c=document.getElementById('sessions'); c.innerHTML='';
  PLANS.forEach(pk=>{
    DAYS.forEach(day=>{
      const div=document.createElement('div');
      div.className='session-container'; div.id=`session-${pk}-${day}`;
      div.style.display=(pk===currentPlan&&day===currentDay)?'block':'none';
      const dayTitle=loadDayTitle(day);
      let html=`<div class="session-header">
        <div class="session-title-wrap">
          <input class="session-title-input" type="text" value="${dayTitle}" placeholder="부위 입력" onchange="saveDayTitle('${day}',this.value)">
          <span class="title-edit-icon">✎</span>
        </div>
        <div class="week-indicator">📍 ${fmtDateShort(currentDate)} 기록 중 (날짜 자동 인식, 따로 안 눌러도 됨)</div>
      </div>`;
      for(let slot=0;slot<SLOTS;slot++) html+=renderCard(pk,day,slot);
      div.innerHTML=html; c.appendChild(div);
    });
  });
}

// renderCard: pk를 받아서 DOM ID에 포함 → 중복 없음
// 데이터 읽기/쓰기는 day+slot 기준 (플랜 무관, 공유)
function renderCard(pk,day,slot){
  const did=domId(pk,day,slot); // DOM용 고유 ID (예: A-월-0, B-월-0)
  const name=loadName(day,slot);
  const reps=loadReps(day,slot);
  const rpe=loadRpe(day,slot);
  const isBW=loadBW(day,slot);

  let hdrRow=`<div class="set-header-row">
    <div class="set-header-label set-col">세트</div>
    ${isBW?'':'<div class="set-header-label input-col">무게(kg)</div>'}
    <div class="set-header-label input-col">횟수</div>
    <div class="set-header-label check-col">완료</div>
  </div>`;
  let setRows='';
  for(let i=1;i<=DEFAULT_SETS;i++){
    const w=loadSetVal(day,slot,'weight',i);
    const r=loadSetVal(day,slot,'reps',i);
    setRows+=`<div class="set-row">
      <div class="set-label">SET ${i}</div>
      ${isBW?'':`<input class="set-input" type="number" inputmode="decimal" placeholder="kg" id="w-${did}-${i}" value="${w}" onchange="onSet('${pk}','${day}',${slot},${i})">`}
      <input class="set-input" type="number" inputmode="numeric" placeholder="회" id="r-${did}-${i}" value="${r}" onchange="onSet('${pk}','${day}',${slot},${i})">
      <div class="set-check" id="c-${did}-${i}" onclick="toggleSet('${pk}','${day}',${slot},${i})">✓</div>
    </div>`;
  }
  let totals='';
  if(!isBW) totals+=`<div class="total-row first"><div class="total-label">총 볼륨 (무게×횟수)</div><div class="total-val" id="vol-${did}">0kg</div></div>`;
  totals+=`<div class="total-row ${isBW?'first':''}"><div class="total-label">총 횟수</div><div class="total-val" id="rep-${did}">0회</div></div>`;
  const memo=loadMemo(day,slot);
  const inner=hdrRow+setRows+totals+`<div class="memo-row"><textarea class="memo-input" id="memo-${did}" placeholder="메모 (자극, 컨디션 등)" rows="1" onchange="saveMemoV('${day}',${slot},this.value)">${memo}</textarea></div>`;

  return `<div class="exercise-card" id="card-${did}">
    <div class="exercise-header" onclick="toggleTracker('${did}')">
      <div class="ex-number" id="num-${did}">${slot+1}</div>
      <div class="ex-info">
        <div class="ex-name-wrap">
          <input class="ex-name" type="text" placeholder="운동 이름 입력" value="${name}" onclick="event.stopPropagation()" onchange="saveNameV('${day}',${slot},this.value)">
          <span class="edit-icon">✎</span>
          <span class="bw-toggle ${isBW?'on':''}" onclick="event.stopPropagation(); toggleBW('${pk}','${day}',${slot})" title="체중운동 ON/OFF">BW</span>
        </div>
        <div class="ex-detail-edit" onclick="event.stopPropagation()">
          <input class="ex-mini-input" type="text" placeholder="세트×횟수  예: 4×8~10" value="${reps}" onchange="saveRepsV('${day}',${slot},this.value)">
          <input class="ex-mini-input" type="text" placeholder="RPE 예: 8~9" value="${rpe}" onchange="saveRpeV('${day}',${slot},this.value)">
        </div>
      </div>
    </div>
    <div class="set-tracker" id="tracker-${did}">${inner}</div>
  </div>`;
}

function toggleTracker(did){ document.getElementById(`tracker-${did}`)?.classList.toggle('open'); }

// BW 토글: 저장 후 A/B 양쪽 카드 재렌더
function toggleBW(pk,day,slot){
  saveBW(day,slot,!loadBW(day,slot));
  PLANS.forEach(p=>{
    const container=document.getElementById(`session-${p}-${day}`);
    if(!container) return;
    const did=domId(p,day,slot);
    const oldCard=document.getElementById(`card-${did}`);
    if(!oldCard) return;
    const wasOpen=document.getElementById(`tracker-${did}`)?.classList.contains('open');
    const tmp=document.createElement('div');
    tmp.innerHTML=renderCard(p,day,slot);
    const newCard=tmp.firstElementChild;
    container.replaceChild(newCard, oldCard);
    if(wasOpen) document.getElementById(`tracker-${did}`)?.classList.add('open');
  });
  updateTotals(pk,day,slot);
}

function renderRecordIfOpen(){ if(document.getElementById('record-view').style.display==='block') renderCalendar(); }

function onSet(pk,day,slot,i){
  const did=domId(pk,day,slot);
  const isBW=loadBW(day,slot);
  if(!isBW) saveSetValV(day,slot,'weight',i,document.getElementById(`w-${did}-${i}`)?.value||'');
  saveSetValV(day,slot,'reps',i,document.getElementById(`r-${did}-${i}`)?.value||'');
  updateTotals(pk,day,slot);
}

function calcTotals(pk,day,slot){
  const did=domId(pk,day,slot);
  const isBW=loadBW(day,slot);
  let vol=0, reps=0;
  for(let i=1;i<=DEFAULT_SETS;i++){
    const r=parseInt(document.getElementById(`r-${did}-${i}`)?.value)||0;
    reps+=r;
    if(!isBW){ const w=parseFloat(document.getElementById(`w-${did}-${i}`)?.value)||0; vol+=w*r; }
  }
  return {vol,reps,isBW};
}

// persist=false 면 화면 표시만 갱신하고 기록(STORE)에는 안 남김.
// (앱을 그냥 열기만 해도 recalcAll이 돌면서 "오늘 기록"을 멋대로 만들어버리는 걸 막기 위함)
function updateTotals(pk,day,slot,persist=true){
  const did=domId(pk,day,slot);
  const {vol,reps,isBW}=calcTotals(pk,day,slot);
  const ve=document.getElementById(`vol-${did}`); if(ve) ve.textContent=vol.toLocaleString()+'kg';
  const re=document.getElementById(`rep-${did}`); if(re) re.textContent=reps.toLocaleString()+'회';
  if(!persist) return;
  // 기록은 데이터 키 기준으로 저장 (A/B 공유)
  const storeKey=`${day}-${slot}`;
  if(!STORE[currentDate]) STORE[currentDate]={};
  STORE[currentDate][storeKey]=isBW?reps:vol;
  STORE[currentDate][storeKey+'_bw']=isBW?1:0;
  saveStore();
  registerDayDate(day,currentDate);
}

// 완료 기준: 2세트 이상
function toggleSet(pk,day,slot,i){
  initAudio();
  const did=domId(pk,day,slot);
  const ck=`${did}-${i}`;
  const chk=document.getElementById(`c-${ck}`);
  const on=chk.classList.toggle('checked');
  checkedSets[ck]=on;
  let cc=0; for(let k=1;k<=DEFAULT_SETS;k++) if(checkedSets[`${did}-${k}`]) cc++;
  document.getElementById(`card-${did}`)?.classList.toggle('done',cc>=2);
  updateTotals(pk,day,slot); updateProgress();
  if(on){ resetTimer(); startTimer(); }
}

function updateProgress(){
  let total=0, done=0;
  for(let slot=0;slot<SLOTS;slot++){
    const did=domId(currentPlan,currentDay,slot);
    for(let i=1;i<=DEFAULT_SETS;i++){ total++; if(checkedSets[`${did}-${i}`]) done++; }
  }
  document.getElementById('progress-fill').style.width=(total>0?done/total*100:0)+'%';
}

function adjustTimer(d){ const nv=timerTarget+d; if(nv<30)return; timerTarget=nv; if(!timerRunning){timerSeconds=timerTarget; updateTimerDisplay();} }
function toggleTimer(){ if(alarmInterval){ stopAlarm(); timerSeconds=timerTarget; updateTimerDisplay(); return; } timerRunning?pauseTimer():startTimer(); }
function startTimer(){ if(timerRunning)return; if(timerSeconds<=0)timerSeconds=timerTarget; timerRunning=true; requestWakeLock(); document.getElementById('timer-start-btn').textContent='정지'; document.getElementById('timer-display').classList.add('running'); timerInterval=setInterval(()=>{ if(timerSeconds>0){timerSeconds--; updateTimerDisplay();} else{ pauseTimer(); startAlarm(); timerSeconds=timerTarget; } },1000); }
function pauseTimer(){ timerRunning=false; clearInterval(timerInterval); document.getElementById('timer-start-btn').textContent='시작'; document.getElementById('timer-display').classList.remove('running'); }
function resetTimer(){ stopAlarm(); pauseTimer(); timerSeconds=timerTarget; updateTimerDisplay(); }
function updateTimerDisplay(){ if(alarmInterval)return; const m=Math.floor(timerSeconds/60),s=timerSeconds%60; document.getElementById('timer-display').textContent=`${m}:${s.toString().padStart(2,'0')}`; }

// 기록 탭: 월간 캘린더. 날짜를 클릭하면 그 날짜에 "실제로" 기록된 것만 보여준다 (다른 날짜 값 상속 없음).
let calYear=null, calMonth=null, calSelectedDate=null;

function pad2(n){ return String(n).padStart(2,'0'); }
function dateStr(y,m,d){ return `${y}-${pad2(m)}-${pad2(d)}`; }

// 그 날짜에 실제로 입력된 값만 (다른 날짜로부터 상속 X) — 메모/세트 기록처럼 "그날 그대로"가 중요한 항목용
function exactValue(prefix,day,slot,suffix,date){
  return localStorage.getItem(`${prefix}_${date}_${dataKey(day,slot)}${suffix}`)||'';
}
function hasAnyRecord(date){
  if(loadBodyweightExact(date)) return true;
  return !!(STORE[date]&&Object.keys(STORE[date]).some(k=>!k.endsWith('_bw')&&STORE[date][k]>0));
}

function renderCalendar(){
  if(!calYear){ const t=new Date(); calYear=t.getFullYear(); calMonth=t.getMonth()+1; }
  const first=new Date(calYear,calMonth-1,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(calYear,calMonth,0).getDate();
  const todayD=todayStr();
  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=dateStr(calYear,calMonth,d);
    const has=hasAnyRecord(ds);
    cells+=`<div class="cal-cell ${has?'has-record':''} ${ds===todayD?'today':''} ${ds===calSelectedDate?'selected':''}" onclick="selectCalDate('${ds}')">
      <div class="cal-daynum">${d}</div>${has?'<div class="cal-dot"></div>':''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=cells;
  document.getElementById('cal-label').textContent=`${calYear}년 ${calMonth}월`;
  renderCalDetail();
}
function calNav(delta){
  calMonth+=delta;
  if(calMonth<1){calMonth=12;calYear--;}
  if(calMonth>12){calMonth=1;calYear++;}
  renderCalendar();
}
function selectCalDate(ds){ calSelectedDate=(calSelectedDate===ds)?null:ds; renderCalendar(); }

function renderCalDetail(){
  const el=document.getElementById('cal-detail');
  if(!calSelectedDate){ el.innerHTML='<div class="cal-empty-msg">날짜를 선택하면 그날 기록이 나와요</div>'; return; }
  const ds=calSelectedDate;
  let html=`<div class="cal-detail-date">${fmtDateShort(ds)} 기록</div>`;
  const bw=loadBodyweightExact(ds);
  if(bw) html+=`<div class="cal-bw-row">⚖️ 공복 체중 <b>${bw}kg</b></div>`;
  let any=!!bw;
  DAYS.forEach(day=>{
    let rows='';
    for(let slot=0;slot<SLOTS;slot++){
      const storeKey=`${day}-${slot}`;
      const val=(STORE[ds]&&STORE[ds][storeKey])?STORE[ds][storeKey]:0;
      if(!val) continue; // 그 날짜에 실제로 한 종목만 — 다른 날짜 값은 안 가져옴
      const isBwRec=!!(STORE[ds]&&STORE[ds][storeKey+'_bw']);
      const nm=valueAtOrBefore('vxname',day,slot,'',ds)||`운동 ${slot+1}`; // 이름은 "그 날짜 기준" 스냅샷
      const memo=exactValue('vxmemo',day,slot,'',ds); // 메모는 그 날짜에 쓴 것만, 상속 없음
      rows+=`<div class="cal-ex-row">
        <div class="cal-ex-name">${nm}</div>
        <div class="cal-ex-val">${val.toLocaleString()}${isBwRec?'회':'kg'}</div>
        ${memo?`<div class="cal-ex-memo">📝 ${memo}</div>`:''}
      </div>`;
    }
    if(rows){ any=true; html+=`<div class="cal-detail-section"><div class="cal-detail-title">${loadDayTitle(day)}</div>${rows}</div>`; }
  });
  if(!any) html+='<div class="cal-empty-msg">이 날은 기록이 없어요</div>';
  el.innerHTML=html;
}

function resetAllRecords(){
  if(confirm('모든 기록을 초기화할까요?\n(무게/횟수/메모/볼륨 삭제, 운동 이름·세트구성·RPE·BW설정은 유지)')){
    STORE={}; saveStore(); checkedSets={};
    try{
      const ks=[];
      for(let k=0;k<localStorage.length;k++){
        const key=localStorage.key(k);
        if(key&&(key.startsWith('vxset_')||key.startsWith('vxmemo_'))) ks.push(key);
      }
      ks.forEach(k=>localStorage.removeItem(k));
    }catch(e){}
    renderCalendar(); renderSessions(); recalcAll(); updateProgress();
  }
}

function recalcAll(){
  PLANS.forEach(pk=>DAYS.forEach(day=>{
    for(let slot=0;slot<SLOTS;slot++){
      const did=domId(pk,day,slot);
      if(document.getElementById(`vol-${did}`)||document.getElementById(`rep-${did}`)) updateTotals(pk,day,slot,false);
    }
  }));
}

loadStore(); loadDayDates(); currentDate=todayStr(); setToday(); renderDayTabs(); renderSessions(); recalcAll(); updateProgress(); updateTimerDisplay(); renderBodyweightInput();
</script>
</body>
